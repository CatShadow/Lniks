<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" >
</head>

<body class="container mt-4">
  <div class="d-flex justify-content-between">
    <h1>Admin</h1>
    <a href="index.html" class="btn btn-secondary">Back</a>
  </div>
  <h3 class="mt-4">Add link</h3>
  <form id="addForm">
    <input id="theme" class="form-control mb-2" placeholder="Theme">
    <input id="name" class="form-control mb-2" placeholder="Name">
    <input id="description" class="form-control mb-2" placeholder="Description">
    <input id="url" class="form-control mb-2" placeholder="URL">
    <button class="btn btn-primary">Add</button>
  </form>
  
  <hr>
  
  <h3>Manage Links</h3>
  <div id="adminThemes"></div>
  <button id="saveBtn" class="btn btn-success mt-3">Save Changes</button>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script src="script.js"></script>
  
</body>
</html>
