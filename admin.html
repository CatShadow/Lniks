<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>Admin</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" >
</head>

<body class="container mt-4">
	<div class="d-flex justify-content-between">
		<h1>Admin</h1>
		<a href="index.html" class="btn btn-secondary">Back</a>
		<button id="toggleAllAdmin" class="btn btn-sm btn-outline-secondary mb-3">
		Expand All
		</button>
	</div>
	<h3 class="mt-4">Add link</h3>
	<form id="addForm">
		<select id="theme" class="form-control mb-2"></select>
		<input id="newTheme" class="form-control mb-2 d-none" placeholder="New theme name">
		<input id="name1" class="form-control mb-2" placeholder="Name">
		<input id="description" class="form-control mb-2" placeholder="Description">
		<input id="url" class="form-control mb-2" placeholder="URL">
		<button class="btn btn-primary">Add</button>
	</form>

	<hr>
  
	<h3>Manage Links</h3>
	<p class="text-muted">
	Drag links to reorder or move between themes.
	Click a link to edit it.
	</p>
	<div id="adminThemes" class="row"></div>
	<button id="saveBtn" class="btn btn-success mt-3">
	Save Changes
	</button>
	<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
	<script src="script.js"></script>
</body>
</html>
